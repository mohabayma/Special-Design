<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Render All Elements Normally -->
    <link rel="stylesheet" href="css/normalize.css" />
    <!-- Font Awesome Library -->
    <link rel="stylesheet" href="css/all.min.css" />
    <!-- Main Template CSS File -->
    <link rel="stylesheet" href="css/master.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&#038;display=swap" rel="stylesheet" />
    <title>Special Dwsign</title>
</head>
<body>
    <!-- Start Landing Page -->
<header class="navbar">
    <a class="logo-container" href="#">
        <div class="logo-icon">MB</div>
        <span class="brand-text">Mercedes-Benz</span>
    </a>
        
<nav class="nav-menu" id="nav-menu">
    <a href="#">Vehicles</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>
<div class="header-icons">
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-regular fa-user"></i>
    <i class="fa-solid fa-bars  toggle-menu" id="menu-btn"></i>
</div>
</header>
<section class="landing">
    <div class="hero-overlay"></div>
    <div class="hero-content">
    <h1>The Best or Nothing</h1>
    <p>Experience the pinnacle of automotive excellence with Mercedes-Benz.
    Where innovation meets luxury.</p>
    <div class="cta-group">
        <a href="#" class="btn-primary">Explore Vehicles</a>
        <a href="#" class="btn-secondary">Build & Practice</a>
    </div>
</div>
</section>
    <!-- End Landing Page -->
        <!--  Start Settings Box -->
<aside class="settings-box">
    <div class="toggle-settings">
    <i class="fa-solid fa-gear"></i>
    </div>
    <div class="settings-container">
        <div class="color-box">
            <h4>Color Mode</h4>
            <div class="theme-toggle">
                <label class="theme-option" data-theme="light">
                    <input type="radio" name="theme" value="light" checked autocomplete="off">
                    <span class="theme-label">Light</span>
                </label>
                <label class="theme-option" data-theme="dark">
                    <input type="radio" name="theme" value="dark" autocomplete="off">
                    <span class="theme-label">Dark</span>
                </label>
            </div>
        </div>
    </div>
</aside>
    <!--  End Settings Box -->
    <script src="js/master.js"></script>
</body>
</html>
